<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persona Forge</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="form-card">
        <h2>New Call</h2>

        <form suggest autocomplete="off" id="profile-form">
            <div class="input-group url-group">
                <label>Image URL</label>
                <input type="text" id="url" placeholder="https://example.com/photo.jpg">

            </div>



            <div class="input-group name-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter full name">
            </div>

            <div class="input-group hometown-group">
                <label>Home Town</label>
                <input type="text" id="hometown" placeholder="Enter home town">
            </div>

            <div class="input-group purpose-group">
                <label>Purpose</label>
                <input type="text" id="purpose" placeholder="e.g., Quick appointment note">
            </div>

            <div class="input-group">
                <label>Category</label>

                <div class="categories category-group">

                    <label class="tag emergency">
                        <input type="radio" name="category" value="Emergency">
                        Emergency
                    </label>

                    <label class="tag important">
                        <input type="radio" name="category" value="Important">
                        Important
                    </label>

                    <label class="tag urgent">
                        <input type="radio" name="category" value="Urgent">
                        Urgent
                    </label>

                    <label class="tag norush">
                        <input type="radio" name="category" value="No Rush">
                        No Rush
                    </label>

                </div>

            </div>

            <button class="create-btn" id="submit-btn">Create Note</button>
            <button type="button" class="close-btn">Close</button>

        </form>
    </div>

    <div class="container">

        <div class="actions">

            <button id="up-btn">↑</button>
            <button id="create-btn">+</button>
            <button id="down-btn">↓</button>
        </div>
<div class="stack">
     
           <div class="card"> 
            <div class="profile">
                <img src="https://images.unsplash.com/photo-1780413021222-1c091c409774?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHwzNnx8fGVufDB8fHx8fA%3D%3D"
                    alt="profile">

                <div class="info">
                    <h2>Abhi</h2>

                    <div class="details">
                        <div>
                            <p>Home Town</p>
                            <span>Delhi</span>
                        </div>

                        <div>
                            <p>Bookings</p>
                            <span>3 Times</span>
                        </div>
                    </div>

                    <div class="buttons">
                        <button class="call">📞 Call</button>
                        <button class="msg">Message</button>
                    </div>
                </div>
            </div>
        </div> 
        
</div>
        

        <div class="colors">
            <span class="black"></span>
            <span class="purple"></span>
            <span class="brown"></span>
            <span class="cyan"></span>
        </div>

    </div>


    <script src="script.js"></script>
</body>

</html>
